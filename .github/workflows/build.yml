name: Build Executables
on: [push]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Nuitka
        run: pip install nuitka

      - name: Build with Nuitka
        # Forzamos el nombre de salida para que no haya dudas
        run: python -m nuitka --onefile --standalone --output-filename=obfuscator_final obfuscator.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binarios-${{ matrix.os }}
          # Usamos un comodín * para que agarre CUALQUIER cosa que se llame obfuscator_final
          path: |
            obfuscator_final.exe
            obfuscator_final.bin
            obfuscator_final
