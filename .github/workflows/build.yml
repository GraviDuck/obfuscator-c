name: Build Executables
on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Nuitka
        run: pip install nuitka

      - name: Build with Nuitka
        # En Windows genera .exe, en Linux genera un binario ELF
        run: python -m nuitka --onefile --standalone obfuscator.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binarios-${{ matrix.os }}
          path: |
            obfuscator.exe
            obfuscator.bin
            obfuscator
